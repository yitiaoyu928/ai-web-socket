<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Web Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 300px;
        padding: 20px;
      }
      .i-btn {
        flex-shrink: 0;
        flex-grow: 0;

        margin: 0 auto;
        padding: 4px 16px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .title {
        margin-bottom: 20px;
      }

      .wrapper {
        text-align: center;
      }
      .input-wrapper {
        box-sizing: border-box;
      }
      .input-wrapper input {
        padding: 4px 16px;
        border: none;
        outline:none;
        border: 1px solid #c1d1c1;
        margin-bottom: 8px;
        border-radius: 8px;
        width: 100%;
      }
      .input-wrapper input:focus {
        border-color: #4CAF50;
      }
      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #666;
      }
      .status.connected {
        color: #4CAF50;
      }
      .status.disconnected {
        color: #f44336;
      }
      .message-log {
        margin-top: 12px;
        max-height: 150px;
        overflow-y: auto;
        background: #f5f5f5;
        padding: 8px;
        border-radius: 4px;
        font-size: 11px;
        text-align: left;
      }
      .message-log div {
        margin-bottom: 4px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="title">当前页面AI: qwen</div>
      <div class="input-wrapper">
        <input id="ws-url" placeholder="socket地址" value="ws://localhost:8899/ws" />
        <button class="i-btn" id="connect-btn">链接Socket</button>
      </div>
      <div class="status disconnected" id="status">未连接</div>
      <div class="message-log" id="message-log"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
