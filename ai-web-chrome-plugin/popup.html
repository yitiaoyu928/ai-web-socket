<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Web Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .wrapper {
        text-align: center;
      }

      .title {
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 600;
        color: #333;
      }

      .input-wrapper {
        margin-bottom: 12px;
      }

      .input-wrapper input {
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        outline: none;
        border-radius: 6px;
        width: 100%;
        font-size: 13px;
        transition: border-color 0.2s;
      }

      .input-wrapper input:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.1);
      }

      .i-btn {
        margin-top: 8px;
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
      }

      .btn-connect {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-connect:hover {
        background: linear-gradient(135deg, #5568d3 0%, #653a8b 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
      }

      .btn-disconnect {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
      }

      .btn-disconnect:hover {
        background: linear-gradient(135deg, #e082ea 0%, #e44659 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(245, 87, 108, 0.3);
      }

      .status-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 12px;
        padding: 8px;
        background: #f9fafb;
        border-radius: 6px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transition: all 0.3s;
      }

      .dot-connected {
        background: #4CAF50;
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
        animation: pulse 2s infinite;
      }

      .dot-disconnected {
        background: #9ca3af;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .status {
        font-size: 13px;
        font-weight: 500;
      }

      .status.connected {
        color: #4CAF50;
      }

      .status.disconnected {
        color: #6b7280;
      }

      .message-log {
        margin-top: 12px;
        max-height: 180px;
        overflow-y: auto;
        background: #f3f4f6;
        padding: 10px;
        border-radius: 6px;
        font-size: 11px;
        text-align: left;
        border: 1px solid #e5e7eb;
      }

      .message-log::-webkit-scrollbar {
        width: 6px;
      }

      .message-log::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 3px;
      }

      .message-log::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 3px;
      }

      .message-log::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      .message-item {
        margin-bottom: 6px;
        word-break: break-all;
        line-height: 1.4;
        color: #374151;
        padding: 4px 6px;
        background: white;
        border-radius: 4px;
        border-left: 3px solid #667eea;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="title">------</div>
      <div class="input-wrapper">
        <input id="ws-url" placeholder="WebSocket 地址" value="ws://localhost:8899/ws" />
        <button class="i-btn btn-connect" id="connect-btn">连接 WebSocket</button>
      </div>
      <div class="status-wrapper">
        <div class="status-dot dot-disconnected" id="status-dot"></div>
        <div class="status disconnected" id="status">未连接</div>
      </div>
      <div class="message-log" id="message-log"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
