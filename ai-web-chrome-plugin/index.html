<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <script>

    
  </script>
  <body>
    <h2>WebSocket 测试客户端</h2>
    <div>
      <input type="text" id="messageInput" placeholder="输入消息..." />
      <button onclick="sendMessage()">发送</button>
      <button onclick="connectWebSocket()">连接</button>
      <button onclick="disconnectWebSocket()">断开</button>
    </div>
    <div style="margin-top: 20px">
      <h3>消息记录:</h3>
      <div
        id="messageLog"
        style="
          border: 1px solid #ccc;
          padding: 10px;
          height: 300px;
          overflow-y: auto;
          background: #f5f5f5;
        "
      ></div>
    </div>

    <script>
      let ws = null;

      function connectWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          logMessage("已经连接", "warning");
          return;
        }

        ws = new WebSocket("ws://localhost:8899/ws");

        ws.onopen = function () {
          logMessage("已连接到服务器", "success");
        };

        ws.onmessage = function (event) {
          logMessage("收到: " + event.data, "received");
        };

        ws.onclose = function () {
          logMessage("连接已关闭", "error");
        };

        ws.onerror = function (error) {
          logMessage("连接错误: " + error, "error");
        };
      }

      function disconnectWebSocket() {
        if (ws) {
          ws.close();
          ws = null;
          logMessage("主动断开连接", "warning");
        }
      }

      function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value.trim();

        if (!message) {
          logMessage("消息不能为空", "warning");
          return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
          logMessage("未连接到服务器，请先点击连接", "error");
          return;
        }

        ws.send(message);
        logMessage("发送: " + message, "sent");
        input.value = "";
      }

      function logMessage(message, type) {
        const log = document.getElementById("messageLog");
        const entry = document.createElement("div");
        entry.style.marginBottom = "5px";
        entry.style.padding = "5px";

        const timestamp = new Date().toLocaleTimeString();

        switch (type) {
          case "sent":
            entry.style.color = "#0066cc";
            break;
          case "received":
            entry.style.color = "#009900";
            break;
          case "error":
            entry.style.color = "#cc0000";
            break;
          case "success":
            entry.style.color = "#009900";
            break;
          case "warning":
            entry.style.color = "#ff9900";
            break;
          default:
            entry.style.color = "#333";
        }

        entry.textContent = `[${timestamp}] ${message}`;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
      }

      // 支持回车发送
      document
        .getElementById("messageInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendMessage();
          }
        });
    </script>
  </body>
</html>
